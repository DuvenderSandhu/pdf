<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SimpleDocs • Image to PDF</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600&display=swap');
        
        .logo-font { font-family: 'Space Grotesk', sans-serif; }
        
        .drop-zone {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .drop-zone.dragover {
            background-color: rgb(234 179 8 / 0.1);
            border-color: rgb(234 179 8);
            transform: scale(1.02);
        }
    </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen font-sans">
    <div class="max-w-6xl mx-auto px-4 py-6">
        <!-- Header -->
        <header class="flex items-center justify-between mb-10">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-yellow-400 text-zinc-950 rounded-2xl flex items-center justify-center text-3xl font-bold logo-font">S</div>
                <span class="text-4xl font-semibold tracking-tighter logo-font">SimpleDocs</span>
            </div>
        </header>

        <div class="max-w-4xl mx-auto">
            <h1 class="text-4xl md:text-5xl font-semibold tracking-tighter text-center mb-2">Image to PDF</h1>
            <p class="text-zinc-400 text-center text-lg">Drop images • Crop • Export perfect PDF</p>

            <!-- Upload Area -->
            <div id="upload-area" 
                 class="drop-zone mt-12 border-4 border-dashed border-zinc-700 hover:border-yellow-400 rounded-3xl p-16 text-center cursor-pointer">
                <div class="mx-auto w-20 h-20 bg-zinc-800 rounded-2xl flex items-center justify-center text-5xl mb-6">
                    📤
                </div>
                <h3 class="text-2xl font-medium mb-2">Drop your images here</h3>
                <p class="text-zinc-400 mb-8">or click below to choose files</p>
                
                <button onclick="triggerFileInput()" 
                        class="px-10 py-5 bg-yellow-400 hover:bg-yellow-300 text-zinc-900 font-semibold rounded-2xl text-lg shadow-lg">
                    Select Images
                </button>
                
                <p class="text-xs text-zinc-500 mt-10">PNG, JPG, JPEG, WEBP supported</p>
            </div>

            <input type="file" id="file-input" multiple accept="image/*" class="hidden">

            <!-- Editor -->
            <div id="editor" class="hidden">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-2xl font-semibold">Edit Images</h2>
                    <div class="flex gap-3">
                        <button onclick="addMoreImages()" 
                                class="px-6 py-3 border border-zinc-600 hover:border-white rounded-2xl">
                            + Add More
                        </button>
                        <button onclick="generatePDF()" 
                                class="px-8 py-3 bg-yellow-400 hover:bg-yellow-300 text-zinc-900 font-semibold rounded-2xl">
                            Download PDF
                        </button>
                    </div>
                </div>

                <div class="grid md:grid-cols-12 gap-6">
                    <!-- Preview -->
                    <div class="md:col-span-8">
                        <div class="bg-zinc-900 border border-zinc-700 rounded-3xl overflow-hidden">
                            <div class="flex items-center justify-between px-6 py-4 border-b border-zinc-700">
                                <span id="current-image-name" class="font-medium"></span>
                                <div class="flex items-center gap-4">
                                    <button onclick="prevImage()" class="text-2xl hover:text-yellow-400">←</button>
                                    <span id="image-counter" class="text-zinc-400">1 / 1</span>
                                    <button onclick="nextImage()" class="text-2xl hover:text-yellow-400">→</button>
                                </div>
                            </div>
                            <div class="p-6 bg-black">
                                <img id="cropper-image" class="max-h-[55vh] mx-auto rounded-xl" alt="">
                            </div>
                        </div>
                    </div>

                    <!-- Controls -->
                    <div class="md:col-span-4 space-y-6">
                        <!-- Page Size -->
                        <div class="bg-zinc-900 border border-zinc-700 rounded-3xl p-6">
                            <h4 class="font-semibold mb-4">Page Size</h4>
                            <div class="space-y-3">
                                <label onclick="selectSize(0)" id="size-original" 
                                       class="flex items-center gap-3 p-4 border-2 border-yellow-400 rounded-2xl cursor-pointer">
                                    <input type="radio" name="size" checked>
                                    <div>
                                        <div>Original Size</div>
                                        <div class="text-xs text-zinc-400">Keeps image quality</div>
                                    </div>
                                </label>
                                <label onclick="selectSize(1)" id="size-a4"
                                       class="flex items-center gap-3 p-4 border border-zinc-700 hover:border-zinc-500 rounded-2xl cursor-pointer">
                                    <input type="radio" name="size">
                                    <div>
                                        <div>A4 Size</div>
                                        <div class="text-xs text-zinc-400">Standard document</div>
                                    </div>
                                </label>
                            </div>
                        </div>

                        <!-- Crop Tools -->
                        <div class="bg-zinc-900 border border-zinc-700 rounded-3xl p-6">
                            <h4 class="font-semibold mb-4">Crop & Rotate</h4>
                            <div class="grid grid-cols-2 gap-3">
                                <button onclick="cropper && cropper.rotate(-90)" 
                                        class="py-4 bg-zinc-800 hover:bg-zinc-700 rounded-2xl">↺ Rotate Left</button>
                                <button onclick="cropper && cropper.rotate(90)" 
                                        class="py-4 bg-zinc-800 hover:bg-zinc-700 rounded-2xl">↻ Rotate Right</button>
                            </div>
                            <button onclick="cropImage()" 
                                    class="mt-4 w-full py-4 bg-white text-black font-semibold rounded-2xl">
                                Apply Crop
                            </button>
                        </div>

                        <!-- Images List -->
                        <div class="bg-zinc-900 border border-zinc-700 rounded-3xl p-6">
                            <h4 class="font-semibold mb-3">Images (<span id="image-count">1</span>)</h4>
                            <div id="images-list" class="space-y-2 max-h-60 overflow-auto"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let images = [];
        let currentIndex = 0;
        let cropper = null;
        let selectedSize = 0; // 0 = original, 1 = A4

        const fileInput = document.getElementById('file-input');
        const uploadArea = document.getElementById('upload-area');
        const editor = document.getElementById('editor');

        function triggerFileInput() {
            fileInput.click();
        }

        // Drag & Drop
        uploadArea.addEventListener('dragover', e => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', e => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            handleFiles(e.dataTransfer.files);
        });

        uploadArea.addEventListener('click', () => {
            triggerFileInput();
        });

        fileInput.addEventListener('change', e => {
            if (e.target.files.length > 0) {
                handleFiles(e.target.files);
            }
        });

        function handleFiles(files) {
            Array.from(files).forEach(file => {
                if (file.type.startsWith('image/')) {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        images.push({
                            name: file.name,
                            data: e.target.result
                        });
                        if (images.length === 1) loadEditor();
                        else {
                            renderImagesList();
                            updateCounter();
                        }
                    };
                    reader.readAsDataURL(file);
                }
            });
        }

        function loadEditor() {
            uploadArea.classList.add('hidden');
            editor.classList.remove('hidden');
            showCurrentImage();
            renderImagesList();
        }

        function showCurrentImage() {
            const img = document.getElementById('cropper-image');
            const current = images[currentIndex];
            
            document.getElementById('current-image-name').textContent = current.name;
            img.src = current.data;
            updateCounter();

            if (cropper) cropper.destroy();

            setTimeout(() => {
                cropper = new Cropper(img, {
                    viewMode: 1,
                    autoCropArea: 0.9,
                    responsive: true,
                });
            }, 150);
        }

        function updateCounter() {
            document.getElementById('image-counter').textContent = `${currentIndex + 1} / ${images.length}`;
            document.getElementById('image-count').textContent = images.length;
        }

        function renderImagesList() {
            const container = document.getElementById('images-list');
            container.innerHTML = '';
            images.forEach((img, i) => {
                const div = document.createElement('div');
                div.className = `flex items-center gap-3 p-3 rounded-2xl cursor-pointer ${i === currentIndex ? 'bg-yellow-400 text-zinc-900' : 'hover:bg-zinc-800'}`;
                div.innerHTML = `
                    <img src="${img.data}" class="w-12 h-12 object-cover rounded-lg">
                    <div class="truncate text-sm">${img.name}</div>
                `;
                div.onclick = () => {
                    currentIndex = i;
                    showCurrentImage();
                    renderImagesList();
                };
                container.appendChild(div);
            });
        }

        function prevImage() {
            if (currentIndex > 0) {
                currentIndex--;
                showCurrentImage();
                renderImagesList();
            }
        }

        function nextImage() {
            if (currentIndex < images.length - 1) {
                currentIndex++;
                showCurrentImage();
                renderImagesList();
            }
        }

        function selectSize(n) {
            selectedSize = n;
            document.getElementById('size-original').classList.toggle('border-yellow-400', n === 0);
            document.getElementById('size-original').classList.toggle('border-zinc-700', n !== 0);
            document.getElementById('size-a4').classList.toggle('border-yellow-400', n === 1);
            document.getElementById('size-a4').classList.toggle('border-zinc-700', n !== 1);
        }

        function cropImage() {
            if (!cropper) return;
            const cropped = cropper.getCroppedCanvas().toDataURL('image/jpeg', 0.95);
            images[currentIndex].data = cropped;
            showCurrentImage();
        }

        function addMoreImages() {
            triggerFileInput();
        }

        async function generatePDF() {
            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF('p', 'mm', 'a4');

            for (let i = 0; i < images.length; i++) {
                if (i > 0) pdf.addPage();

                const tempImg = new Image();
                tempImg.src = images[i].data;

                await new Promise(resolve => {
                    tempImg.onload = () => {
                        let x = 10, y = 10, w = 190;

                        if (selectedSize === 1) { // A4
                            const ratio = Math.min(190 / tempImg.width, 277 / tempImg.height);
                            w = tempImg.width * ratio;
                            const h = tempImg.height * ratio;
                            x = (210 - w) / 2;
                            y = (297 - h) / 2;
                            pdf.addImage(tempImg, 'JPEG', x, y, w, h);
                        } else {
                            const ratio = Math.min(190 / tempImg.width, 277 / tempImg.height);
                            w = tempImg.width * ratio;
                            const h = tempImg.height * ratio;
                            pdf.addImage(tempImg, 'JPEG', x, y, w, h);
                        }
                        resolve();
                    };
                });
            }
            pdf.save('My_Document.pdf');
        }

        // Keyboard support
        document.addEventListener('keydown', e => {
            if (editor.classList.contains('hidden')) return;
            if (e.key === "ArrowLeft") prevImage();
            if (e.key === "ArrowRight") nextImage();
        });
    </script>
</body>
                                                                        </html>
